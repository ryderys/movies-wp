

services:
  wordpress:
    build: .
    ports:
      # Bind to localhost only — Caddy on the host handles public 80/443.
      # Ignored when using docker-compose.prod.external-db.yml (host network).
      - "127.0.0.1:8080:8080"
    environment:
      DB_HOST: ${DB_HOST:-db}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      WP_ENV: ${WP_ENV:-production}
      WP_DEBUG: ${WP_DEBUG:-0}
      WP_DEBUG_LOG: ${WP_DEBUG_LOG:-0}
      WP_DEBUG_DISPLAY: ${WP_DEBUG_DISPLAY:-0}
      FORCE_SSL_ADMIN: ${FORCE_SSL_ADMIN:-0}
      DISABLE_XMLRPC: ${DISABLE_XMLRPC:-1}
      WP_HOME: ${WP_HOME:-}
      WP_SITEURL: ${WP_SITEURL:-}
    volumes:
      - wp_content:/var/www/html/wp-content
    depends_on:
      db:
        condition: service_healthy
        required: false
    restart: unless-stopped

  # Only used when DB_HOST=db (local MySQL container). Omit profile for external DB.
  db:
    profiles: ["local-db"]
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password --sql-mode=""
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  db_data:
  wp_content:
