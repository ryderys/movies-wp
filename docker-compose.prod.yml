services:
  wordpress:
    image: movies-wordpress:latest
    ports:
      - "127.0.0.1:8080:80"
    environment:
      DB_HOST: ${DB_HOST}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DATABASE: ${REDIS_DATABASE:-0}
      REDIS_PREFIX: ${REDIS_PREFIX:-movies_prod_}
      WP_DEBUG: ${WP_DEBUG:-0}
      WP_DEBUG_LOG: ${WP_DEBUG_LOG:-0}
      WP_DEBUG_DISPLAY: ${WP_DEBUG_DISPLAY:-0}
    volumes:
      - wp_content:/var/www/html/wp-content
    restart: unless-stopped
    depends_on:
      - redis

  redis:
    image: ${REDIS_IMAGE:-public.ecr.aws/docker/library/redis:7-alpine}
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save ""
      --appendonly no
      --rename-command FLUSHDB ""
      --rename-command FLUSHALL ""
      --rename-command CONFIG ""
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  wp_content:
  redis_data:
